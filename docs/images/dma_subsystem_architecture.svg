  <text class="node-title" id="svg_18" text-anchor="middle" x="820" y="273">Request FIFO (4)</text>
  <text class="body" id="svg_19" text-anchor="middle" x="820" y="307">write pointer</text>
  <text class="body" id="svg_20" text-anchor="middle" x="820" y="333">read pointer</text>
  <rect class="node" height="120" id="svg_21" width="220" x="970" y="238"/>
