  <path class="wire" d="m820,358l0,162l235,0l0,145" id="svg_46"/>
  <text class="body" id="svg_47" transform="matrix(1 0 0 1 -9.01804 -40.0802)" x="870" y="548">1) write descriptor first</text>
  <path class="wire" d="m429.86,680.03l-119.86,0l0,-235.03l70,0" id="svg_48" transform="matrix(1 0 0 1 0 0)"/>
  <text class="body" id="svg_49" transform="matrix(1 0 0 1 -133.263 97.0421)" x="320" y="430">read_status_*</text>
  <path class="wire" d="m1169.14,682.03l119.86,0l1,-237.03l-70,0" id="svg_50"/>
  <text class="body" id="svg_51" transform="matrix(1 0 0 1 187.375 92.1844)" x="1120" y="430">write_status_*</text>
  <rect class="node" height="94" id="svg_52" width="245" x="35" y="670"/>
