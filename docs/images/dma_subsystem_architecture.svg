  <text class="body" id="svg_14" text-anchor="middle" x="530" y="355">control regs</text>
  <text class="body" id="svg_15" text-anchor="middle" x="530" y="381">status regs</text>
  <text class="body" id="svg_16" text-anchor="middle" x="530" y="407">irq_enable_reg</text>
