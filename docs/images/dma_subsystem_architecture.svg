  <text class="small" id="svg_28" text-anchor="middle" transform="matrix(1 0 0 1 92.1844 -4.00802)" x="808" y="414">completion readback</text>
  <path class="wire" d="m1220,270l140,0" id="svg_29"/>
  <text class="small" id="svg_30" text-anchor="middle" x="1285" y="258">irq_enable_reg</text>
  <path class="wire" d="m1220,320l140,0" id="svg_31"/>
  <text class="small" id="svg_32" text-anchor="middle" x="1285" y="345">comp_fifo_m_valid</text>
