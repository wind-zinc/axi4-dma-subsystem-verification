  <text class="body" id="svg_54" text-anchor="middle" x="157" y="735">in AXI Memory</text>
  <path class="bidir" d="m280,717l150,0" id="svg_55"/>
  <text class="body" id="svg_56" text-anchor="middle" transform="matrix(1 0 0 1 -22.0441 51.1022)" x="355" y="694">AXI4 Read</text>
  <text class="small" id="svg_57" text-anchor="middle" transform="matrix(1 0 0 1 -25.0501 23.0461)" x="355" y="744">AR / R</text>
  <rect class="node" height="94" id="svg_58" width="245" x="1320" y="670"/>
  <text class="node-title" id="svg_59" text-anchor="middle" x="1442" y="706">Destination region</text>
  <text class="body" id="svg_60" text-anchor="middle" x="1442" y="735">in AXI Memory</text>
  <path class="bidir" d="m1170,717l150,0" id="svg_61"/>
  <text class="body" id="svg_62" text-anchor="middle" transform="matrix(1 0 0 1 22.0441 51.1022)" x="1245" y="694">AXI4 Write</text>
  <text class="small" id="svg_63" text-anchor="middle" transform="matrix(1 0 0 1 21.0421 24.0481)" x="1245" y="744">AW / W / B</text>
  <rect class="node" height="92" id="svg_64" width="300" x="650" y="858"/>
  <text class="node-title" id="svg_65" text-anchor="middle" transform="matrix(1 0 0 1 0 0)" x="800" y="895">axis_fifo (16)</text>
  <text class="body" id="svg_66" text-anchor="middle" x="800" y="928">TDATA / TKEEP / TLAST</text>
  <path class="wire" d="m545,757l0,73l175,0l0,28" id="svg_67"/>
  <text class="body" id="svg_68" x="575" y="821">AXI-Stream</text>
  <path class="wire" d="m880,858l0,-28l175,0l0,-73" id="svg_69"/>
  <text class="body" id="svg_70" x="920" y="821">AXI-Stream</text>
  <text class="body" id="svg_71" text-anchor="middle" x="800" y="982">Completion is queued after both read and write status pulses are received.</text>
  <path d="m1081.16,361.92c0,0.89 0,1.83 0,2.84c0,0.76 -0.15,1.54 -0.65,2.28c-0.45,0.68 -0.35,1.73 -0.35,2.48c0,0.91 0.13,1.82 0,2.72c-0.14,0.93 -0.71,1.59 -0.94,2.36l-0.06,0.95l0,0.99l0,0.7" fill="none" id="svg_72"/>
  <line fill="none" id="svg_74" stroke="#000000" stroke-width="2" transform="rotate(-1.67647 1078.93 374.608)" x1="1079.43" x2="1078.42" y1="358.54" y2="390.68"/>
 </g>
