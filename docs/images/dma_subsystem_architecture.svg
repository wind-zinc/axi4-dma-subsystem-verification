<?xml version="1.0"?>
<svg width="1600" height="1000" xmlns="http://www.w3.org/2000/svg" xmlns:svg="http://www.w3.org/2000/svg">
 <defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3.5"
          orient="auto-start-reverse" markerUnits="strokeWidth">
   <path d="M0,0 L10,3.5 L0,7 Z" fill="#000"/>
  </marker>
  <style>text { font-family: Arial, Helvetica, sans-serif; fill: #000; }
      .title { font-size: 34px; font-weight: 700; }
      .group-title { font-size: 25px; font-weight: 700; }
      .node-title { font-size: 21px; font-weight: 700; }
      .body { font-size: 17px; }
      .small { font-size: 15px; }
      .group { fill: #fff; stroke: #000; stroke-width: 2.4; }
      .node { fill: #fff; stroke: #000; stroke-width: 2; }
      .wire { fill: none; stroke: #000; stroke-width: 2; marker-end: url(#arrow); }
      .bidir { fill: none; stroke: #000; stroke-width: 2; marker-start: url(#arrow); marker-end: url(#arrow); }
      .plain { fill: none; stroke: #000; stroke-width: 2; }</style>
 </defs>
 <!-- Descriptor dispatch originates only at Request FIFO. -->
 <!-- Status returns originate at the corresponding DMA engines. -->
 <g class="layer">
  <title>Layer 1</title>
  <rect fill="#fff" height="1000" id="svg_2" transform="matrix(1 0 0 1 0 7.60456)" width="1600"/>
  <text class="title" id="svg_3" text-anchor="middle" x="800" y="48">AXI4 Mem-to-Mem DMA Subsystem Architecture</text>
  <rect class="node" height="70" id="svg_4" width="440" x="580" y="70"/>
  <text class="node-title" id="svg_5" text-anchor="middle" x="800" y="101">AXI4-Lite Control Interface</text>
  <text class="body" id="svg_5b" text-anchor="middle" x="800" y="127">(DUT Slave Port)</text>
  <path class="bidir" d="m800,140l0,40" id="svg_6"/>
  <text class="body" id="svg_7" x="820" y="166">register access</text>
  <rect class="group" height="290" id="svg_8" width="840" x="380" y="180"/>
  <text class="group-title" id="svg_9" text-anchor="middle" x="800" y="215">dma_desc_manager</text>
